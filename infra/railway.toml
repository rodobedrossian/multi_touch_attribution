# Railway configuration for the Collector API service
# Dashboard is a separate service with its own config

[build]
builder = "NIXPACKS"
buildCommand = "pnpm --filter api build"

[deploy]
startCommand = "node packages/api/dist/server.js"
healthcheckPath = "/v1/healthz"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
